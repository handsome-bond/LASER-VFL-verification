      0.5: *dec_d3
  
  diabetes4:
    4:
      0.0: &dec_d4
        <<: *laser_d4
      0.1: *dec_d4
      0.5: *dec_d4

  diabetes5:
    4:
      0.0: *base_d5
      0.05: *base_d5
      0.1: *base_d5
      0.15: *base_d5
      0.2: *base_d5
